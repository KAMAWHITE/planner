<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Finance Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-glow: rgba(139, 92, 246, 0.5);
            --secondary: #06b6d4;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
            --uzum: #8b5cf6;
            --uydan: #0ea5e9;
            --chiqim: #f43f5e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(6, 182, 212, 0.15) 0px, transparent 50%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 50px;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .total-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: 700;
            display: block;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 24px 0 16px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .section-title::after {
            content: '';
            flex-grow: 1;
            height: 1px;
            background: linear-gradient(to right, var(--glass-border), transparent);
        }

        .task-list {
            list-style: none;
        }

        .item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .amount {
            font-weight: 600;
            font-size: 1rem;
        }

        .uzum .amount { color: #c084fc; }
        .uydan .amount { color: #38bdf8; }
        .chiqim .amount { color: #f87171; }

        .checked {
            opacity: 0.5;
            filter: grayscale(0.5);
        }

        .checked .amount {
            text-decoration: line-through;
        }

        /* Tabs for filtering if needed */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab {
            padding: 8px 16px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
            font-size: 0.85rem;
        }

        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .add-custom {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input, select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            outline: none;
        }

        button.main-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button.main-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .container { padding: 24px 16px; }
            h1 { font-size: 1.8rem; }
            .input-row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Moliya Planner</h1>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Daromad va xarajatlarni aqlli boshqarish</p>
        </header>

        <div class="total-stats">
            <div class="stat-card">
                <span id="totalIncome" class="stat-val" style="color: var(--success);">0</span>
                <span class="stat-label">Jami Tushum</span>
            </div>
            <div class="stat-card">
                <span id="totalExpense" class="stat-val" style="color: var(--danger);">0</span>
                <span class="stat-label">Jami Chiqim</span>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterTasks('all')">Barchasi</div>
            <div class="tab" onclick="filterTasks('uzum')">Uzum</div>
            <div class="tab" onclick="filterTasks('uydan')">Uydan</div>
            <div class="tab" onclick="filterTasks('chiqim')">To'lovlar</div>
        </div>

        <div id="planner-content">
            <!-- Sections will be rendered here -->
        </div>

        <div class="add-custom">
            <h3 style="margin-bottom: 15px; font-size: 1rem;">Yangi ma'lumot qo'shish</h3>
            <div class="input-row">
                <input type="text" id="newLabel" placeholder="Nomi (masalan: 27 Apr)" style="flex: 1;">
                <input type="text" id="newAmount" placeholder="Summa (masalan: +416 000)" style="flex: 1;">
            </div>
            <div class="input-row">
                <select id="newCategory" style="flex: 1;">
                    <option value="uzum">🍇 Uzum</option>
                    <option value="uydan">🏠 Uydan</option>
                    <option value="chiqim">💸 Chiqim</option>
                </select>
                <button class="main-btn" onclick="addNewItem()">Qo'shish</button>
            </div>
        </div>
    </div>

    <script>
        // Initial Data from user
        const initialData = [
            { id: 'uz1', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '27 Apr', amount: '+416 000', checked: false },
            { id: 'uz2', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '11 May', amount: '+221 000', checked: false },
            { id: 'uz3', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '14 May', amount: '+450 000', checked: false },
            { id: 'uz4', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '27 May', amount: '+639 000', checked: false },
            { id: 'uz5', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '10 Iyun', amount: '+212 000', checked: false },
            { id: 'uz6', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '26 Iyun', amount: '+399 000', checked: false },
            { id: 'uz7', category: 'uzum', section: '🍇 UZUMDAN Tushumlar', date: '09 Iyul', amount: '+197 000', checked: false },
            
            { id: 'uy1', category: 'uydan', section: '🏠 UYDAN Tushumlar', date: '05 May', amount: '+300 000', checked: false },
            { id: 'uy2', category: 'uydan', section: '🏠 UYDAN Tushumlar', date: '25 May', amount: '+500 000', checked: false },
            { id: 'uy3', category: 'uydan', section: '🏠 UYDAN Tushumlar', date: '05 Iyun', amount: '+300 000', checked: false },
            { id: 'uy4', category: 'uydan', section: '🏠 UYDAN Tushumlar', date: '25 Iyun', amount: '+500 000', checked: false },
            { id: 'uy5', category: 'uydan', section: '🏠 UYDAN Tushumlar', date: '05 Iyul', amount: '+300 000', checked: false },
            
            { id: 'ch1', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '27 Apr', amount: '-288 000', checked: false },
            { id: 'ch2', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '30 Apr', amount: '-53 000', checked: false },
            { id: 'ch3', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '01 May', amount: '-55 000', checked: false },
            { id: 'ch4', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '02 May', amount: '-8 000', checked: false },
            { id: 'ch5', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '05 May', amount: '-53 000', checked: false },
            { id: 'ch6', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '11 May', amount: '-81 000', checked: false },
            { id: 'ch7', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '12 May', amount: '-119 000', checked: false },
            { id: 'ch8', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '14 May', amount: '-1 100 000', checked: false },
            { id: 'ch9', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '15 May', amount: '-30 000', checked: false },
            { id: 'ch10', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '26 May', amount: '-439 000', checked: false },
            { id: 'ch11', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '27 May', amount: '-260 000', checked: false },
            { id: 'ch12', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '01 Iyun', amount: '-55 000', checked: false },
            { id: 'ch13', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '10 Iyun', amount: '-232 000', checked: false },
            { id: 'ch14', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '13 Iyun', amount: '-473 000', checked: false },
            { id: 'ch15', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '15 Iyun', amount: '-30 000', checked: false },
            { id: 'ch16', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '26 Iyun', amount: '-671 000', checked: false },
            { id: 'ch17', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '01 Iyul', amount: '-55 000', checked: false },
            { id: 'ch18', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '09 Iyul', amount: '-217 000', checked: false },
            { id: 'ch19', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '25 Iyul', amount: '-419 000', checked: false },
            { id: 'ch20', category: 'chiqim', section: "💸 To'lovlar (Qarzlar)", date: '08 Avg', amount: '-207 000', checked: false },
        ];

        let financeData = JSON.parse(localStorage.getItem('finance_data')) || initialData;
        let currentFilter = 'all';

        function saveData() {
            localStorage.setItem('finance_data', JSON.stringify(financeData));
            render();
        }

        function toggleItem(id) {
            financeData = financeData.map(item => item.id === id ? { ...item, checked: !item.checked } : item);
            saveData();
        }

        function filterTasks(cat) {
            currentFilter = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function addNewItem() {
            const label = document.getElementById('newLabel').value.trim();
            const amount = document.getElementById('newAmount').value.trim();
            const category = document.getElementById('newCategory').value;
            
            if (!label || !amount) return;

            const newItem = {
                id: 'custom_' + Date.now(),
                category: category,
                section: category === 'uzum' ? '🍇 UZUMDAN Tushumlar' : (category === 'uydan' ? '🏠 UYDAN Tushumlar' : "💸 To'lovlar (Qarzlar)"),
                date: label,
                amount: amount,
                checked: false
            };

            financeData.push(newItem);
            document.getElementById('newLabel').value = '';
            document.getElementById('newAmount').value = '';
            saveData();
        }

        function calculateStats() {
            let income = 0;
            let expense = 0;

            financeData.forEach(item => {
                const val = parseInt(item.amount.replace(/[^0-9-]/g, '')) || 0;
                if (val > 0) income += val;
                else expense += Math.abs(val);
            });

            document.getElementById('totalIncome').innerText = income.toLocaleString() + " so'm";
            document.getElementById('totalExpense').innerText = expense.toLocaleString() + " so'm";
        }

        function render() {
            const container = document.getElementById('planner-content');
            container.innerHTML = '';

            const sections = {};
            
            const filteredData = currentFilter === 'all' ? financeData : financeData.filter(d => d.category === currentFilter);

            filteredData.forEach(item => {
                if (!sections[item.section]) sections[item.section] = [];
                sections[item.section].push(item);
            });

            for (const sectionTitle in sections) {
                const sectionDiv = document.createElement('div');
                sectionDiv.innerHTML = `<div class="section-title">${sectionTitle}</div>`;
                
                const list = document.createElement('div');
                list.className = 'task-list';

                sections[sectionTitle].forEach(item => {
                    const label = document.createElement('label');
                    label.className = `item ${item.category} ${item.checked ? 'checked' : ''}`;
                    label.innerHTML = `
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleItem('${item.id}')">
                        <div class="details">
                            <span class="date">${item.date}</span>
                            <span class="amount">${item.amount}</span>
                        </div>
                    `;
                    list.appendChild(label);
                });

                sectionDiv.appendChild(list);
                container.appendChild(sectionDiv);
            }

            calculateStats();
        }

        // Init
        render();
    </script>
</body>
</html>
